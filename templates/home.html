{% extends 'base.html' %}

{% block content %}
<div class="bg-white shadow-md rounded-lg p-6 text-center">
    <h1 class="text-2xl font-bold mb-4">Welcome to Book Manager</h1>
    <p class="mb-6">This application allows you to manage books and authors in your database.</p>
    
    <div class="flex justify-center space-x-4">
        <a href="{{ url_for('list_books') }}" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">
            View Books
        </a>
        <a href="{{ url_for('list_authors') }}" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded">
            View Authors
        </a>
    </div>
</div>
{% endblock %}
